name: Kappaski Proof Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  proof-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kappaski
        run: python -m pip install -e .

      - name: Verify proof and ledger
        run: |
          test -f .kappaski/proof.json
          test -f .kappaski/ledger.jsonl
          kappaski proof verify --proof .kappaski/proof.json --ledger .kappaski/ledger.jsonl
          kappaski gate verify --proof .kappaski/proof.json --ledger .kappaski/ledger.jsonl --mode ci --out .kappaski/gate-report.json

      - name: Upload Kappaski artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kappaski-proof-gate
          path: |
            .kappaski/proof.json
            .kappaski/ledger.jsonl
            .kappaski/gate-report.json
